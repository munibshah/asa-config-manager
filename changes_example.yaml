# Example interface changes configuration
# Copy this file to changes.yaml and update with your desired changes

interfaces:
  - interface: "GigabitEthernet0/1"
    vlan: 100
    nameif: "inside"
  
  - interface: "GigabitEthernet0/2"
    vlan: 200
    nameif: "dmz"
  
  - interface: "GigabitEthernet0/3"
    nameif: "outside"
  
  # You can also change only VLAN or only nameif
  - interface: "GigabitEthernet0/4"
    vlan: 300
